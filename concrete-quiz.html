<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concrete Enterprise Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.8rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .quiz-section {
            display: none;
        }

        .quiz-section.active {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-counter {
            text-align: center;
            margin-bottom: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        .progress-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 5px solid #667eea;
        }

        .question h3 {
            color: #333;
            font-size: 1.3rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .option:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .option.selected {
            border-color: #667eea;
            background: linear-gradient(45deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
        }

        .option.correct {
            border-color: #4CAF50;
            background: linear-gradient(45deg, rgba(76, 175, 80, 0.1), rgba(76, 175, 80, 0.2));
        }

        .option.incorrect {
            border-color: #f44336;
            background: linear-gradient(45deg, rgba(244, 67, 54, 0.1), rgba(244, 67, 54, 0.2));
        }

        .feedback {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .feedback.correct {
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
            border: 2px solid #4CAF50;
        }

        .feedback.incorrect {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border: 2px solid #f44336;
        }

        .buttons {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .start-screen, .results-screen {
            text-align: center;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            position: relative;
        }

        .score-circle.excellent { background: linear-gradient(45deg, #4CAF50, #8BC34A); }
        .score-circle.good { background: linear-gradient(45deg, #FF9800, #FFC107); }
        .score-circle.average { background: linear-gradient(45deg, #2196F3, #03A9F4); }
        .score-circle.poor { background: linear-gradient(45deg, #f44336, #FF5722); }

        .results-message {
            color: #333;
            font-size: 1.4rem;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .container { padding: 25px; }
            .logo { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Start Screen -->
        <div id="startScreen" class="start-screen">
            <div class="header">
                <div class="logo">🗿 Concrete</div>
                <h2>Enterprise Quiz</h2>
                <p class="subtitle">Test your knowledge about Concrete Enterprise — Institutional Vault Infrastructure</p>
            </div>
            <button class="btn" onclick="startQuiz()">Start Quiz</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="quiz-section">
            <div class="header">
                <div class="logo">Concrete Enterprise</div>
            </div>
            
            <div class="question-counter">
                Question <span id="currentQuestion">1</span> of 10
            </div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>

            <div class="question">
                <h3 id="questionText"></h3>
                <div class="options" id="optionsContainer"></div>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="buttons">
                <button id="nextBtn" class="btn" onclick="nextQuestion()" style="display:none;">Next Question →</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="quiz-section results-screen">
            <div class="header">
                <div class="logo">🗿 Concrete</div>
                <h2>Quiz Complete!</h2>
            </div>
            
            <div id="scoreCircle" class="score-circle">
                <span id="scoreText">0/10</span>
                <div class="score-text" id="scoreLabel">Score</div>
            </div>

            <div class="results-message" id="resultsMessage"></div>

            <div class="results-breakdown">
                <div class="breakdown-item"><strong>Correct Answers:</strong> <span id="correctCount">0</span></div>
                <div class="breakdown-item"><strong>Accuracy:</strong> <span id="accuracy">0%</span></div>
            </div>

            <button class="btn" onclick="restartQuiz()">Restart Quiz</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "What is Concrete Enterprise?",
                options: [
                    "A retail trading app for DeFi users",
                    "Institutional vault infrastructure launched by ConcreteXYZ",
                    "A stablecoin issuance platform",
                    "A Layer 2 blockchain solution"
                ],
                correct: 1
            },
            {
                q: "Which of the following best describes the core design goal of Concrete Enterprise?",
                options: [
                    "To simplify meme coin trading",
                    "To bring trading desk-level rigor on-chain with automated operations",
                    "To create NFT marketplaces",
                    "To focus only on Bitcoin yield"
                ],
                correct: 1
            },
            {
                q: "What key accounting feature does Concrete Enterprise provide?",
                options: [
                    "Monthly manual reports",
                    "Real-time NAV (Net Asset Value) accounting",
                    "Only on-chain price feeds",
                    "Off-chain Excel tracking"
                ],
                correct: 1
            },
            {
                q: "Which investors/backers are associated with Concrete?",
                options: [
                    "a16z, Paradigm, and Coinbase Ventures",
                    "Polychain, Yzi Labs, and VanEck",
                    "Binance Labs only",
                    "Solana Foundation exclusively"
                ],
                correct: 1
            },
            {
                q: "Concrete Enterprise turns vaults into:",
                options: [
                    "Simple savings accounts",
                    "Programmable asset managers",
                    "Decentralized exchanges",
                    "Insurance protocols"
                ],
                correct: 1
            },
            {
                q: "Which institutional control feature is highlighted in Concrete Enterprise?",
                options: [
                    "Role-based permissions and multi-sig roles",
                    "Anonymous trading only",
                    "Unlimited leverage without oversight",
                    "No withdrawal limits"
                ],
                correct: 0
            },
            {
                q: "What standard are Concrete’s vaults primarily built on?",
                options: [
                    "ERC-20",
                    "ERC-4626",
                    "ERC-721",
                    "ERC-1155"
                ],
                correct: 1
            },
            {
                q: "What does the demo of Concrete Enterprise showcase?",
                options: [
                    "A mobile gaming interface",
                    "A professional dark-themed dashboard with automations, withdrawal history, and strategy parameters",
                    "A social media feed",
                    "A prediction market"
                ],
                correct: 1
            },
            {
                q: "Concrete Enterprise is designed primarily for:",
                options: [
                    "Retail crypto traders only",
                    "Institutions and partners deploying capital across custom strategies",
                    "NFT collectors",
                    "Blockchain gamers"
                ],
                correct: 1
            },
            {
                q: "What broader vision does Concrete Enterprise support?",
                options: [
                    "Making Concrete Vaults the core infrastructure layer for on-chain capital formation",
                    "Replacing all centralized exchanges",
                    "Focusing only on Ethereum Layer 1",
                    "Building a new Layer 1 blockchain"
                ],
                correct: 0
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let selectedAnswer = null;

        function startQuiz() {
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('quizScreen').classList.add('active');
            currentQuestionIndex = 0;
            score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('questionText').innerHTML = q.q;
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            q.options.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = option;
                div.onclick = () => selectAnswer(index, div);
                optionsContainer.appendChild(div);
            });

            document.getElementById('feedback').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            selectedAnswer = null;
        }

        function selectAnswer(index, element) {
            if (selectedAnswer !== null) return;

            selectedAnswer = index;
            
            // Remove selected from all
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            
            // Add selected
            element.classList.add('selected');

            const correctIndex = questions[currentQuestionIndex].correct;
            
            // Show feedback
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';

            if (index === correctIndex) {
                score++;
                feedback.className = 'feedback correct';
                feedback.textContent = '✅ Correct!';
                element.classList.add('correct');
            } else {
                feedback.className = 'feedback incorrect';
                feedback.textContent = '❌ Incorrect';
                element.classList.add('incorrect');
                
                // Highlight correct answer
                options.forEach((opt, i) => {
                    if (i === correctIndex) opt.classList.add('correct');
                });
            }

            document.getElementById('nextBtn').style.display = 'inline-block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quizScreen').classList.remove('active');
            document.getElementById('resultsScreen').classList.add('active');

            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('scoreText').textContent = `${score}/${questions.length}`;
            document.getElementById('correctCount').textContent = score;
            document.getElementById('accuracy').textContent = `${percentage}%`;

            const circle = document.getElementById('scoreCircle');
            circle.classList.remove('excellent', 'good', 'average', 'poor');

            if (percentage >= 90) {
                circle.classList.add('excellent');
                document.getElementById('resultsMessage').innerHTML = '🏆 Excellent! You are a Concrete Expert!';
            } else if (percentage >= 70) {
                circle.classList.add('good');
                document.getElementById('resultsMessage').innerHTML = '👏 Great Job! You know Concrete well.';
            } else if (percentage >= 50) {
                circle.classList.add('average');
                document.getElementById('resultsMessage').innerHTML = '👍 Not bad! Keep learning about Concrete Enterprise.';
            } else {
                circle.classList.add('poor');
                document.getElementById('resultsMessage').innerHTML = '📚 You might want to review the Concrete announcement again.';
            }
        }

        function restartQuiz() {
            document.getElementById('resultsScreen').classList.remove('active');
            document.getElementById('startScreen').classList.add('active');
        }

        // Initialize
        window.onload = function() {
            // Make start screen active by default
            document.getElementById('startScreen').classList.add('active');
        };
    </script>
</body>
</html>
