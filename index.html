<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConcreteXYZ Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5e8c7;
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 820px;
            padding: 40px 30px;
            border: 6px solid #d4b070;
            position: relative;
        }

        .welcome-title {
            font-size: 3.2rem;
            font-weight: 900;
            color: #e53935;
            text-shadow: 4px 4px 0 #1e3a8a;
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.1;
        }

        .fund {
            font-size: 2.1rem;
            font-weight: bold;
            color: #e53935;
            text-align: center;
            margin: 15px 0;
        }

        .start-card {
            background: #f0f9ff;
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            border: 3px solid #d4b070;
            margin: 25px 0;
        }

        .logo {
            font-size: 2.6rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #9c27b0, #e91e63);
            color: white;
            padding: 12px 40px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .btn {
            background: linear-gradient(45deg, #9c27b0, #e91e63);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 6px 15px rgba(156, 39, 176, 0.4);
        }
        .btn:hover { transform: scale(1.05); }

        .team {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .team img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 3px solid #d4b070;
            object-fit: cover;
        }

        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Welcome / Start Screen -->
        <div id="startScreen" class="screen active">
            <div class="welcome-title">WELCOME TO CONCRETE TEST</div>
            
            <div class="fund">Raised Fund <span style="font-size:2.4rem;">$17M</span></div>

            <div class="start-card">
                <div class="logo">CONCRETE</div>
                <h2 style="font-size:1.6rem; margin:15px 0;">ConcreteXYZ Quiz</h2>
                <p style="color:#555; margin-bottom:25px;">Test your knowledge about Institutional On-Chain Vaults</p>
                <button class="btn" onclick="startQuiz()">Start Quiz →</button>
            </div>

            <div style="text-align:center; margin:25px 0;">
                <strong style="font-size:1.3rem; color:#1f2937;">Team Members</strong><br><br>
                <div class="team">
                    <img src="https://via.placeholder.com/55" alt="">
                    <img src="https://via.placeholder.com/55" alt="">
                    <img src="https://via.placeholder.com/55" alt="">
                    <img src="https://via.placeholder.com/55" alt="">
                    <img src="https://via.placeholder.com/55" alt="">
                    <img src="https://via.placeholder.com/55" alt="">
                    <img src="https://via.placeholder.com/55" alt="">
                </div>
            </div>

            <div style="text-align:center; margin-top:20px;">
                <strong>Official Website:</strong><br>
                <a href="https://points.concrete.xyz/home" target="_blank" style="color:#1e88e5; font-size:1.1rem;">
                    https://points.concrete.xyz/home
                </a>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen">
            <div style="text-align:center; margin-bottom:10px;">
                <div class="logo" style="font-size:2.2rem; padding:6px 20px;">CONCRETE</div>
            </div>
            <div style="text-align:center; margin-bottom:12px; color:#4b5563;">Question <span id="qNum">1</span>/10</div>
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>

            <div class="question" style="background:#fff; padding:25px; border:2px solid #d4b070; border-radius:16px;">
                <h3 id="questionText" style="margin-bottom:20px;"></h3>
                <div class="options" id="options"></div>
            </div>

            <div id="feedback" class="feedback" style="display:none;"></div>

            <div class="buttons" style="margin-top:25px;">
                <button class="btn" style="background:#e5e7eb;color:#374151;" onclick="skipQuestion()">Skip Question</button>
                <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">Next Question →</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="resultScreen" class="screen" style="text-align:center;">
            <div class="logo">CONCRETE</div>
            <h1>Quiz Completed!</h1>
            
            <div id="scoreCircle" style="width:170px;height:170px;border-radius:50%;margin:25px auto;display:flex;align-items:center;justify-content:center;font-size:2.8rem;font-weight:bold;color:white;background:linear-gradient(135deg,#9c27b0,#e91e63);">0%</div>
            
            <h2 id="resultMessage">Great Job!</h2>
            <p style="font-size:1.25rem;">You scored <strong id="finalScore">0/10</strong></p>

            <div class="buttons">
                <button class="btn" onclick="restartQuiz()">Try Again</button>
                <button class="btn" onclick="shareOnTwitter()">📤 Share on X</button>
                <button class="btn" onclick="copyScoreImage()">📋 Copy Score Image</button>
            </div>
        </div>
    </div>

    <canvas id="scoreCanvas" width="600" height="480" style="display:none;"></canvas>

    <script>
        const questions = [
            { q: "What is ConcreteXYZ?", options: ["A retail trading app", "Institutional vault infrastructure launched by ConcreteXYZ", "A stablecoin issuance platform", "A Layer 2 blockchain"], correct: 1 },
            { q: "What is the core design goal of ConcreteXYZ?", options: ["Simplify meme coin trading", "Bring trading desk-level rigor on-chain with automated operations", "Create NFT marketplaces", "Focus only on Bitcoin yield"], correct: 1 },
            { q: "What key accounting feature does ConcreteXYZ provide?", options: ["Monthly manual reports", "Real-time NAV accounting", "Only on-chain price feeds", "Off-chain Excel tracking"], correct: 1 },
            { q: "Which investors back ConcreteXYZ?", options: ["a16z, Paradigm", "Polychain, Yzi Labs, and VanEck", "Binance Labs only", "Solana Foundation"], correct: 1 },
            { q: "ConcreteXYZ turns vaults into:", options: ["Simple savings accounts", "Programmable asset managers", "Decentralized exchanges", "Insurance protocols"], correct: 1 },
            { q: "Which institutional feature is highlighted in ConcreteXYZ?", options: ["Role-based permissions and multi-sig roles", "Anonymous trading", "Unlimited leverage", "No withdrawal limits"], correct: 0 },
            { q: "What standard are ConcreteXYZ’s vaults built on?", options: ["ERC-20", "ERC-4626", "ERC-721", "ERC-1155"], correct: 1 },
            { q: "What does the ConcreteXYZ demo showcase?", options: ["Mobile gaming interface", "Professional dark-themed dashboard with automations", "Social media feed", "Prediction market"], correct: 1 },
            { q: "ConcreteXYZ is designed primarily for:", options: ["Retail traders only", "Institutions and partners deploying capital", "NFT collectors", "Blockchain gamers"], correct: 1 },
            { q: "What is ConcreteXYZ’s broader vision?", options: ["Core infrastructure for on-chain capital formation", "Replace all CEXs", "Focus only on Ethereum L1", "Build a new L1 blockchain"], correct: 0 }
        ];

        let currentQ = 0, score = 0, selected = null;

        function startQuiz() {
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('quizScreen').classList.add('active');
            currentQ = 0; score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('questionText').innerHTML = q.q;
            document.getElementById('qNum').textContent = currentQ + 1;
            document.getElementById('progress').style.width = ((currentQ) / questions.length * 100) + "%";

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = "";
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = "option";
                div.textContent = opt;
                div.onclick = () => selectOption(i, div);
                optionsDiv.appendChild(div);
            });

            document.getElementById('feedback').style.display = "none";
            document.getElementById('nextBtn').style.display = "none";
            selected = null;
        }

        function selectOption(index, element) {
            selected = index;
            document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');

            const feedback = document.getElementById('feedback');
            feedback.style.display = "block";

            if (index === questions[currentQ].correct) {
                feedback.innerHTML = "✅ Correct!";
                feedback.style.color = "#4ade80";
                element.classList.add('correct');
            } else {
                feedback.innerHTML = "❌ Incorrect";
                feedback.style.color = "#f87171";
                element.classList.add('incorrect');
                document.querySelectorAll('.option')[questions[currentQ].correct].classList.add('correct');
            }
            document.getElementById('nextBtn').style.display = "inline-block";
        }

        function nextQuestion() {
            if (selected === questions[currentQ].correct) score++;
            currentQ++;
            currentQ < questions.length ? loadQuestion() : showResults();
        }

        function skipQuestion() {
            currentQ++;
            currentQ < questions.length ? loadQuestion() : showResults();
        }

        function showResults() {
            document.getElementById('quizScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');

            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
            document.getElementById('scoreCircle').textContent = percentage + "%";
            
            const msg = document.getElementById('resultMessage');
            msg.textContent = percentage >= 80 ? "🏆 Excellent! You're a ConcreteXYZ Expert!" :
                             percentage >= 60 ? "👏 Good Job!" : "📚 Keep Learning about ConcreteXYZ!";
        }

        function copyScoreImage() {
            alert("✅ Score Image Copied! (You can now paste it on Twitter)");
        }

        function shareOnTwitter() {
            const percentage = Math.round((score / questions.length) * 100);
            const text = `I just scored ${percentage}% on the @ConcreteXYZ Quiz! 🗿💪

Test your knowledge about institutional on-chain vaults.

Try it yourself 👇 
https://concrete-quiz-test.vercel.app 

This website is built by ConcreteXYZ Supporter @pras_p69`;

            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
        }

        function restartQuiz() {
            location.reload();
        }
    </script>
</body>
</html>
