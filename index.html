<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConcreteXYZ Quiz</title>
    <style>
        :root {
            --primary: #00f5c0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border: 1px solid rgba(0, 245, 192, 0.2);
        }
        .logo {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #00f5c0, #67e8f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 10px;
        }
        h1 { text-align: center; color: white; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; }

        .screen { display: none; }
        .screen.active { display: block; }

        .btn {
            background: linear-gradient(45deg, #00f5c0, #22d3ee);
            color: #0f172a;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin: 8px;
        }
        .btn:hover { transform: translateY(-3px); }
        .btn-skip { background: transparent; border: 2px solid #475569; color: #94a3b8; }
        .btn-twitter { background: #1DA1F2; color: white; }

        .progress-bar {
            height: 8px;
            background: #334155;
            border-radius: 999px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #00f5c0, #67e8f9);
            width: 0%;
            transition: width 0.4s;
        }

        .question {
            background: #1e2937;
            padding: 25px;
            border-radius: 16px;
            margin: 20px 0;
        }
        .options {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }
        .option {
            background: #334155;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover { background: #475569; }
        .option.selected { background: rgba(0, 245, 192, 0.2); border: 2px solid var(--primary); }

        .feedback { margin: 20px 0; padding: 15px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">

        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <div class="logo">🗿 ConcreteXYZ</div>
            <h1>ConcreteXYZ Quiz</h1>
            <p class="subtitle">Test your knowledge about ConcreteXYZ Institutional Vault Infrastructure</p>
            <center><button class="btn" onclick="startQuiz()">Start Quiz →</button></center>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen">
            <div class="logo">🗿 ConcreteXYZ</div>
            <div style="text-align:center; margin-bottom:10px;">Question <span id="qNum">1</span>/10</div>
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>

            <div class="question">
                <h3 id="questionText"></h3>
                <div class="options" id="options"></div>
            </div>

            <div id="feedback" class="feedback" style="display:none;"></div>

            <center>
                <button class="btn btn-skip" onclick="skipQuestion()">Skip Question</button>
                <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">Next Question →</button>
            </center>
        </div>

        <!-- Result Screen -->
        <div id="resultScreen" class="screen" style="text-align:center;">
            <div class="logo">🗿 ConcreteXYZ</div>
            <h1>Quiz Completed!</h1>
            
            <div id="scoreCircle" style="width:180px;height:180px;border-radius:50%;margin:20px auto;background:linear-gradient(45deg,#00f5c0,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:3rem;font-weight:bold;color:#0f172a;">
                0%
            </div>
            
            <h2 id="resultMessage"></h2>
            <p style="font-size:1.4rem;">You scored <strong id="finalScore">0/10</strong></p>

            <div style="margin-top:30px;">
                <button class="btn" onclick="restartQuiz()">Try Again</button>
                <button class="btn btn-twitter" id="shareBtn" onclick="shareOnTwitter()" style="display:none;">
                    📤 Share Score on X
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "What is ConcreteXYZ?", options: ["A retail trading app", "Institutional vault infrastructure launched by ConcreteXYZ", "A stablecoin issuance platform", "A Layer 2 blockchain"], correct: 1 },
            { q: "What is the core design goal of ConcreteXYZ?", options: ["Simplify meme coin trading", "Bring trading desk-level rigor on-chain with automated operations", "Create NFT marketplaces", "Focus only on Bitcoin yield"], correct: 1 },
            { q: "What key accounting feature does ConcreteXYZ provide?", options: ["Monthly manual reports", "Real-time NAV accounting", "Only on-chain price feeds", "Off-chain Excel tracking"], correct: 1 },
            { q: "Which investors back ConcreteXYZ?", options: ["a16z, Paradigm", "Polychain, Yzi Labs, and VanEck", "Binance Labs only", "Solana Foundation"], correct: 1 },
            { q: "ConcreteXYZ turns vaults into:", options: ["Simple savings accounts", "Programmable asset managers", "Decentralized exchanges", "Insurance protocols"], correct: 1 },
            { q: "Which institutional feature is highlighted?", options: ["Role-based permissions and multi-sig roles", "Anonymous trading", "Unlimited leverage", "No withdrawal limits"], correct: 0 },
            { q: "What standard are ConcreteXYZ’s vaults built on?", options: ["ERC-20", "ERC-4626", "ERC-721", "ERC-1155"], correct: 1 },
            { q: "What does the demo showcase?", options: ["Mobile gaming interface", "Professional dark-themed dashboard", "Social media feed", "Prediction market"], correct: 1 },
            { q: "ConcreteXYZ is designed primarily for:", options: ["Retail traders only", "Institutions and partners deploying capital", "NFT collectors", "Blockchain gamers"], correct: 1 },
            { q: "What is ConcreteXYZ’s broader vision?", options: ["Core infrastructure for on-chain capital formation", "Replace all CEXs", "Focus only on Ethereum L1", "Build a new L1 blockchain"], correct: 0 }
        ];

        let currentQ = 0;
        let score = 0;
        let selected = null;

        function startQuiz() {
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('quizScreen').classList.add('active');
            currentQ = 0;
            score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('questionText').innerHTML = q.q;
            document.getElementById('qNum').textContent = currentQ + 1;
            document.getElementById('progress').style.width = ((currentQ / questions.length) * 100) + "%";

            const container = document.getElementById('options');
            container.innerHTML = '';

            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt;
                div.onclick = () => selectOption(i, div);
                container.appendChild(div);
            });

            document.getElementById('feedback').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            selected = null;
        }

        function selectOption(index, element) {
            selected = index;
            document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');

            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';

            if (index === questions[currentQ].correct) {
                feedback.innerHTML = "✅ Correct!";
                feedback.style.color = "#4ade80";
                element.classList.add('correct');
            } else {
                feedback.innerHTML = "❌ Incorrect";
                feedback.style.color = "#f87171";
                element.classList.add('incorrect');
                document.querySelectorAll('.option')[questions[currentQ].correct].classList.add('correct');
            }
            document.getElementById('nextBtn').style.display = 'inline-block';
        }

        function nextQuestion() {
            if (selected === questions[currentQ].correct) score++;
            currentQ++;
            currentQ < questions.length ? loadQuestion() : showResults();
        }

        function skipQuestion() {
            currentQ++;
            currentQ < questions.length ? loadQuestion() : showResults();
        }

        function showResults() {
            document.getElementById('quizScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');

            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
            document.getElementById('scoreCircle').textContent = percentage + "%";

            const msg = document.getElementById('resultMessage');
            msg.textContent = percentage >= 80 ? "🏆 Excellent! You're a ConcreteXYZ Expert!" :
                             percentage >= 60 ? "👏 Good Job!" : "📚 Keep Learning about ConcreteXYZ!";

            document.getElementById('shareBtn').style.display = percentage >= 70 ? "inline-block" : "none";
        }

        function shareOnTwitter() {
            const percentage = Math.round((score / questions.length) * 100);
            const text = `I just scored ${percentage}% on the @ConcreteXYZ Quiz! 🗿💪

Test your knowledge about institutional on-chain vaults.

Try it yourself 👇

This website is built by ConcreteXYZ Supporter @pras_p69

https://concrete-quiz-test.vercel.app`;

            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
        }

        function restartQuiz() {
            location.reload();
        }
    </script>
</body>
</html>
