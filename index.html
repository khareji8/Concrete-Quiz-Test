<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConcreteXYZ Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5e8c7;
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 850px;
            padding: 40px;
            border: 4px solid #d4b070;
        }

        .logo {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 12px;
            text-align: center;
            margin-bottom: 15px;
            color: #1f2937;
            border: 4px solid #1f2937;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 6px;
        }

        h1 { text-align: center; margin-bottom: 8px; color: #1f2937; }
        .subtitle { text-align: center; color: #4b5563; margin-bottom: 30px; font-size: 1.15rem; }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }

        .btn {
            background: linear-gradient(45deg, #00f5c0, #22d3ee);
            color: #0f172a;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 8px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 245, 192, 0.4); }

        .btn-skip { background: transparent; color: #4b5563; border: 2px solid #9ca3af; }
        .btn-skip:hover { background: #e5e7eb; }

        .btn-twitter { background: #1DA1F2; color: white; }
        .btn-copy { background: #6b7280; color: white; }

        .progress-bar { height: 8px; background: #e5e7eb; border-radius: 999px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; background: linear-gradient(to right, #00f5c0, #22d3ee); width: 0%; transition: width 0.4s ease; }

        .question { 
            background: #fff; 
            padding: 30px; 
            border-radius: 16px; 
            margin: 25px 0; 
            border: 2px solid #d4b070; 
        }
        .options { 
            display: grid; 
            gap: 10px; 
            margin-top: 20px; 
        }
        .option { 
            background: #f9fafb; 
            padding: 14px 18px;   /* Smaller padding */
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s; 
            border: 2px solid #d1d5db;
            font-size: 0.98rem;   /* Smaller text */
        }
        .option:hover { border-color: #00f5c0; }
        .option.selected { background: rgba(0, 245, 192, 0.1); border-color: #00f5c0; }
        .option.correct { border-color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .option.incorrect { border-color: #f87171; background: rgba(248, 113, 113, 0.1); }

        .feedback { margin-top: 20px; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .buttons { text-align: center; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <div class="logo">CONCRETE</div>
            <h1>ConcreteXYZ Quiz</h1>
            <p class="subtitle">Test your knowledge about Institutional On-Chain Vaults</p>
            <center><button class="btn" onclick="startQuiz()">Start Quiz →</button></center>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen">
            <div class="logo">CONCRETE</div>
            <div style="text-align:center; margin-bottom:15px; color:#4b5563;">Question <span id="qNum">1</span>/10</div>
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>

            <div class="question">
                <h3 id="questionText"></h3>
                <div class="options" id="options"></div>
            </div>

            <div id="feedback" class="feedback" style="display:none;"></div>

            <div class="buttons">
                <button class="btn btn-skip" onclick="skipQuestion()">Skip Question</button>
                <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">Next Question →</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="resultScreen" class="screen" style="text-align:center;">
            <div class="logo">CONCRETE</div>
            <h1>Quiz Completed!</h1>
            
            <div id="scoreCircle" style="width:180px;height:180px;border-radius:50%;margin:25px auto;display:flex;align-items:center;justify-content:center;font-size:3rem;font-weight:bold;color:white;background:linear-gradient(45deg,#00f5c0,#22d3ee);">0%</div>
            
            <h2 id="resultMessage">Great Job!</h2>
            <p style="font-size:1.3rem;">You scored <strong id="finalScore">0/10</strong></p>

            <div class="buttons">
                <button class="btn" onclick="restartQuiz()">Try Again</button>
                <button class="btn btn-twitter" onclick="shareOnTwitter()">📤 Share on X</button>
                <button class="btn btn-copy" onclick="copyScoreImage()">📋 Copy Score Image</button>
            </div>
        </div>
    </div>

    <canvas id="scoreCanvas" width="600" height="480" style="display:none;"></canvas>

    <script>
        const questions = [
            { q: "What is ConcreteXYZ?", options: ["A retail trading app", "Institutional vault infrastructure launched by ConcreteXYZ", "A stablecoin issuance platform", "A Layer 2 blockchain"], correct: 1 },
            { q: "What is the core design goal of ConcreteXYZ?", options: ["Simplify meme coin trading", "Bring trading desk-level rigor on-chain with automated operations", "Create NFT marketplaces", "Focus only on Bitcoin yield"], correct: 1 },
            { q: "What key accounting feature does ConcreteXYZ provide?", options: ["Monthly manual reports", "Real-time NAV accounting", "Only on-chain price feeds", "Off-chain Excel tracking"], correct: 1 },
            { q: "Which investors back ConcreteXYZ?", options: ["a16z, Paradigm", "Polychain, Yzi Labs, and VanEck", "Binance Labs only", "Solana Foundation"], correct: 1 },
            { q: "ConcreteXYZ turns vaults into:", options: ["Simple savings accounts", "Programmable asset managers", "Decentralized exchanges", "Insurance protocols"], correct: 1 },
            { q: "Which institutional feature is highlighted in ConcreteXYZ?", options: ["Role-based permissions and multi-sig roles", "Anonymous trading", "Unlimited leverage", "No withdrawal limits"], correct: 0 },
            { q: "What standard are ConcreteXYZ’s vaults built on?", options: ["ERC-20", "ERC-4626", "ERC-721", "ERC-1155"], correct: 1 },
            { q: "What does the ConcreteXYZ demo showcase?", options: ["Mobile gaming interface", "Professional dark-themed dashboard with automations", "Social media feed", "Prediction market"], correct: 1 },
            { q: "ConcreteXYZ is designed primarily for:", options: ["Retail traders only", "Institutions and partners deploying capital", "NFT collectors", "Blockchain gamers"], correct: 1 },
            { q: "What is ConcreteXYZ’s broader vision?", options: ["Core infrastructure for on-chain capital formation", "Replace all CEXs", "Focus only on Ethereum L1", "Build a new L1 blockchain"], correct: 0 }
        ];

        let currentQ = 0, score = 0, selected = null;

        function startQuiz() {
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('quizScreen').classList.add('active');
            currentQ = 0; score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('questionText').innerHTML = q.q;
            document.getElementById('qNum').textContent = currentQ + 1;
            document.getElementById('progress').style.width = ((currentQ) / questions.length * 100) + "%";

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = "";
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = "option";
                div.textContent = opt;
                div.onclick = () => selectOption(i, div);
                optionsDiv.appendChild(div);
            });

            document.getElementById('feedback').style.display = "none";
            document.getElementById('nextBtn').style.display = "none";
            selected = null;
        }

        function selectOption(index, element) {
            selected = index;
            document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');

            const feedback = document.getElementById('feedback');
            feedback.style.display = "block";

            if (index === questions[currentQ].correct) {
                feedback.innerHTML = "✅ Correct!";
                feedback.style.color = "#4ade80";
                element.classList.add('correct');
            } else {
                feedback.innerHTML = "❌ Incorrect";
                feedback.style.color = "#f87171";
                element.classList.add('incorrect');
                document.querySelectorAll('.option')[questions[currentQ].correct].classList.add('correct');
            }
            document.getElementById('nextBtn').style.display = "inline-block";
        }

        function nextQuestion() {
            if (selected === questions[currentQ].correct) score++;
            currentQ++;
            currentQ < questions.length ? loadQuestion() : showResults();
        }

        function skipQuestion() {
            currentQ++;
            currentQ < questions.length ? loadQuestion() : showResults();
        }

        function showResults() {
            document.getElementById('quizScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');

            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
            document.getElementById('scoreCircle').textContent = percentage + "%";
            
            const msg = document.getElementById('resultMessage');
            msg.textContent = percentage >= 80 ? "🏆 Excellent! You're a ConcreteXYZ Expert!" :
                             percentage >= 60 ? "👏 Good Job!" : "📚 Keep Learning about ConcreteXYZ!";
        }

        function copyScoreImage() {
            const percentage = Math.round((score / questions.length) * 100);
            const canvas = document.getElementById('scoreCanvas');
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = "#0f172a";
            ctx.fillRect(0, 0, 600, 480);

            ctx.fillStyle = "#00f5c0";
            ctx.font = "bold 52px Arial";
            ctx.textAlign = "center";
            ctx.fillText("ConcreteXYZ", 300, 85);

            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 26px Arial";
            ctx.fillText("Quiz Completed!", 300, 125);

            ctx.beginPath();
            ctx.arc(300, 245, 95, 0, Math.PI * 2);
            ctx.fillStyle = "#00f5c0";
            ctx.fill();

            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 65px Arial";
            ctx.fillText(percentage + "%", 300, 258);

            ctx.font = "bold 29px Arial";
            ctx.fillText(`${score}/10`, 300, 295);

            ctx.fillStyle = "#94a3b8";
            ctx.font = "26px Arial";
            ctx.fillText("Institutional Vault Quiz", 300, 370);

            const resultMsg = percentage >= 80 ? "🏆 Excellent! You're a ConcreteXYZ Expert!" :
                              percentage >= 60 ? "👏 Good Job!" : "📚 Keep Learning about ConcreteXYZ";
            
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 21px Arial";
            ctx.fillText(resultMsg, 300, 420);

            canvas.toBlob(blob => {
                navigator.clipboard.write([new ClipboardItem({'image/png': blob})]).then(() => {
                    alert("✅ Score Image Copied Successfully!\n\nPaste (Ctrl + V) in your Twitter post.");
                });
            });
        }

        function shareOnTwitter() {
            const percentage = Math.round((score / questions.length) * 100);
            const text = `I just scored ${percentage}% on the @ConcreteXYZ Quiz! 🗿💪

Test your knowledge about institutional on-chain vaults.

Try it yourself 👇 
https://concrete-quiz-test.vercel.app 

This website is built by ConcreteXYZ Supporter @pras_p69`;

            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
        }

        function restartQuiz() {
            location.reload();
        }
    </script>
</body>
</html>
