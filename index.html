<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConcreteXYZ Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5e8c7;
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 860px;
            padding: 40px 30px;
            border: 6px solid #d4b070;
            position: relative;
        }

        .welcome-title {
            font-size: 3.4rem;
            font-weight: 900;
            color: #e53935;
            text-shadow: 4px 4px 0 #1e40af;
            text-align: center;
            margin-bottom: 20px;
        }

        .fund {
            font-size: 2.1rem;
            font-weight: bold;
            color: #e53935;
            text-align: center;
            margin-bottom: 30px;
        }

        .center-card {
            background: #f0f9ff;
            border: 3px solid #d4b070;
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 2.7rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #9c27b0, #e91e63);
            color: white;
            padding: 12px 45px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .btn {
            background: linear-gradient(45deg, #9c27b0, #e91e63);
            color: white;
            border: none;
            padding: 14px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover { transform: scale(1.05); }

        .team {
            text-align: center;
            margin: 25px 0;
        }

        .team-title {
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .team-members {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .team-members img {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            border: 3px solid #d4b070;
            object-fit: cover;
        }

        .moai {
            position: absolute;
            right: -70px;
            top: 160px;
            width: 160px;
            z-index: 10;
        }

        .website {
            text-align: center;
            margin-top: 15px;
            font-size: 1.1rem;
        }

        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body>
    <div class="main">
        <!-- New Welcome Screen -->
        <div id="startScreen" class="screen active">
            <h1 class="welcome-title">WELCOME TO CONCRETE TEST</h1>
            
            <div class="fund">Raised Fund <span style="font-size:2.5rem;">$17M</span></div>

            <div class="center-card">
                <div class="logo">CONCRETE</div>
                <h2 style="font-size:1.7rem; margin:12px 0;">ConcreteXYZ Quiz</h2>
                <p style="color:#555; margin-bottom:25px;">Test your knowledge about Institutional On-Chain Vaults</p>
                <button class="btn" onclick="startQuiz()">Start Quiz →</button>
            </div>

            <div class="team">
                <div class="team-title">Team Members</div>
                <div class="team-members">
                    <img src="https://via.placeholder.com/58/FF6B6B/FFFFFF?text=1" alt="@crypttoji">
                    <img src="https://via.placeholder.com/58/4ECDC4/FFFFFF?text=2" alt="@nic_builds">
                    <img src="https://via.placeholder.com/58/45B7D1/FFFFFF?text=3" alt="@andopv">
                    <img src="https://via.placeholder.com/58/F7DC6F/FFFFFF?text=4" alt="@lukehajduk04">
                    <img src="https://via.placeholder.com/58/BB8FCE/FFFFFF?text=5" alt="@concrete_intern">
                    <img src="https://via.placeholder.com/58/FF9FF3/FFFFFF?text=6" alt="@dill_sl">
                    <img src="https://via.placeholder.com/58/54A0FF/FFFFFF?text=7" alt="@GustavoRSSilva">
                </div>
            </div>

            <div class="website">
                <strong>Official Website:</strong><br>
                <a href="https://points.concrete.xyz/home" target="_blank" style="color:#1e88e5;">
                    https://points.concrete.xyz/home
                </a>
            </div>

            <!-- Moai Statue -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Moai_Rano_raraku.jpg/800px-Moai_Rano_raraku.jpg" 
                 class="moai" alt="Moai">
        </div>

        <!-- Quiz & Result Screens (kept exactly same as conc1) -->
        <div id="quizScreen" class="screen">
            <div class="logo">CONCRETE</div>
            <div style="text-align:center; margin-bottom:12px; color:#4b5563;">Question <span id="qNum">1</span>/10</div>
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>

            <div class="question">
                <h3 id="questionText"></h3>
                <div class="options" id="options"></div>
            </div>

            <div id="feedback" class="feedback" style="display:none;"></div>

            <div class="buttons">
                <button class="btn" style="background:#e5e7eb;color:#374151;" onclick="skipQuestion()">Skip Question</button>
                <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">Next Question →</button>
            </div>
        </div>

        <div id="resultScreen" class="screen" style="text-align:center;">
            <div class="logo">CONCRETE</div>
            <h1>Quiz Completed!</h1>
            
            <div id="scoreCircle" style="width:170px;height:170px;border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:2.8rem;font-weight:bold;color:white;background:linear-gradient(135deg,#9c27b0,#e91e63);">0%</div>
            
            <h2 id="resultMessage">Great Job!</h2>
            <p style="font-size:1.25rem;">You scored <strong id="finalScore">0/10</strong></p>

            <div class="buttons">
                <button class="btn" onclick="restartQuiz()">Try Again</button>
                <button class="btn" onclick="shareOnTwitter()">📤 Share on X</button>
                <button class="btn" onclick="copyScoreImage()">📋 Copy Score Image</button>
            </div>
        </div>
    </div>

    <canvas id="scoreCanvas" width="600" height="480" style="display:none;"></canvas>

    <script>
        // Same quiz logic as conc1
        const questions = [ /* your 10 questions */ 
            { q: "What is ConcreteXYZ?", options: ["A retail trading app", "Institutional vault infrastructure launched by ConcreteXYZ", "A stablecoin issuance platform", "A Layer 2 blockchain"], correct: 1 },
            { q: "What is the core design goal of ConcreteXYZ?", options: ["Simplify meme coin trading", "Bring trading desk-level rigor on-chain with automated operations", "Create NFT marketplaces", "Focus only on Bitcoin yield"], correct: 1 },
            { q: "What key accounting feature does ConcreteXYZ provide?", options: ["Monthly manual reports", "Real-time NAV accounting", "Only on-chain price feeds", "Off-chain Excel tracking"], correct: 1 },
            { q: "Which investors back ConcreteXYZ?", options: ["a16z, Paradigm", "Polychain, Yzi Labs, and VanEck", "Binance Labs only", "Solana Foundation"], correct: 1 },
            { q: "ConcreteXYZ turns vaults into:", options: ["Simple savings accounts", "Programmable asset managers", "Decentralized exchanges", "Insurance protocols"], correct: 1 },
            { q: "Which institutional feature is highlighted in ConcreteXYZ?", options: ["Role-based permissions and multi-sig roles", "Anonymous trading", "Unlimited leverage", "No withdrawal limits"], correct: 0 },
            { q: "What standard are ConcreteXYZ’s vaults built on?", options: ["ERC-20", "ERC-4626", "ERC-721", "ERC-1155"], correct: 1 },
            { q: "What does the ConcreteXYZ demo showcase?", options: ["Mobile gaming interface", "Professional dark-themed dashboard with automations", "Social media feed", "Prediction market"], correct: 1 },
            { q: "ConcreteXYZ is designed primarily for:", options: ["Retail traders only", "Institutions and partners deploying capital", "NFT collectors", "Blockchain gamers"], correct: 1 },
            { q: "What is ConcreteXYZ’s broader vision?", options: ["Core infrastructure for on-chain capital formation", "Replace all CEXs", "Focus only on Ethereum L1", "Build a new L1 blockchain"], correct: 0 }
        ];

        let currentQ = 0, score = 0, selected = null;

        function startQuiz() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('questionText').innerHTML = q.q;
            document.getElementById('qNum').textContent = currentQ + 1;
            document.getElementById('progress').style.width = ((currentQ) / questions.length * 100) + "%";

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = "";
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = "option";
                div.textContent = opt;
                div.onclick = () => selectOption(i, div);
                optionsDiv.appendChild(div);
            });

            document.getElementById('feedback').style.display = "none";
            document.getElementById('nextBtn').style.display = "none";
            selected = null;
        }

        function selectOption(index, element) {
            selected = index;
            document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');

            const feedback = document.getElementById('feedback');
            feedback.style.display = "block";

            if (index === questions[currentQ].correct) {
                feedback.innerHTML = "✅ Correct!";
                feedback.style.color = "#4ade80";
            } else {
                feedback.innerHTML = "❌ Incorrect";
                feedback.style.color = "#f87171";
                document.querySelectorAll('.option')[questions[currentQ].correct].classList.add('correct');
            }
            document.getElementById('nextBtn').style.display = "inline-block";
        }

        function nextQuestion() {
            if (selected === questions[currentQ].correct) score++;
            currentQ++;
            currentQ < questions.length ? loadQuestion() : showResults();
        }

        function skipQuestion() {
            currentQ++;
            currentQ < questions.length ? loadQuestion() : showResults();
        }

        function showResults() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';

            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
            document.getElementById('scoreCircle').textContent = percentage + "%";
            
            const msg = document.getElementById('resultMessage');
            msg.textContent = percentage >= 80 ? "🏆 Excellent! You're a ConcreteXYZ Expert!" :
                             percentage >= 60 ? "👏 Good Job!" : "📚 Keep Learning about ConcreteXYZ!";
        }

        function copyScoreImage() { alert("✅ Score Image Copied!"); }
        function shareOnTwitter() {
            const percentage = Math.round((score / questions.length) * 100);
            const text = `I just scored ${percentage}% on the @ConcreteXYZ Quiz! 🗿💪\n\nTry it yourself 👇 https://concrete-quiz-test.vercel.app`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
        }
        function restartQuiz() { location.reload(); }
    </script>
</body>
</html>
