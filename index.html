<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConcreteXYZ Quiz</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; padding: 40px; }
        .container { max-width: 700px; margin: auto; background: #1e2937; padding: 40px; border-radius: 20px; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; border: none; border-radius: 50px; cursor: pointer; }
        .btn { background: #00f5c0; color: black; }
        .btn-twitter { background: #1DA1F2; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗿 ConcreteXYZ Quiz</h1>
        <p>Test your knowledge about ConcreteXYZ</p>
        <button class="btn" onclick="startQuiz()">Start Quiz</button>

        <div id="quiz" style="display:none">
            <h2 id="question"></h2>
            <div id="options"></div>
            <button onclick="skip()">Skip</button>
            <button id="next" style="display:none" onclick="next()">Next</button>
        </div>

        <div id="result" style="display:none">
            <h2>You scored <span id="score">0</span>/10</h2>
            <button class="btn" onclick="location.reload()">Try Again</button>
            <button class="btn btn-twitter" onclick="shareScore()" id="shareButton" style="display:none">Share on X</button>
        </div>
    </div>

    <script>
        const questions = [ /* shortened for simplicity */ 
            { q: "What is ConcreteXYZ?", a: ["Retail app", "Institutional vault infrastructure", "Stablecoin", "L2"], correct: 1 }
            // Add all 10 questions if you want
        ];

        let current = 0, score = 0;

        function startQuiz() {
            document.querySelector('button').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            loadQ();
        }

        function loadQ() {
            // Simple version - you can expand later
            document.getElementById('question').innerHTML = questions[current].q;
            // ... (options logic)
        }

        function shareScore() {
            const text = `I just scored ${score}/10 on the @ConcreteXYZ Quiz! 🗿💪

Test your knowledge about institutional on-chain vaults.

Try it yourself 👇

This website is built by ConcreteXYZ Supporter @pras_p69

https://concrete-quiz-test.vercel.app`;
            window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
        }
    </script>
</body>
</html>
