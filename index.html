<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConcreteXYZ Quiz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #e6dec1;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.3);
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .screen {
            display: none;
            width: 100%;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Start Screen Layout */
        #startScreen {
            padding: 18px;
        }

        .welcome-title {
            font-family: 'Arial Black', Impact, sans-serif;
            font-size: 4.16rem;
            color: black;
            text-transform: lowercase;
            text-align: center;
            -webkit-text-stroke: 2px cyan;
            text-shadow: 4px 4px 0 black;
            margin-bottom: 46px;
            letter-spacing: 2px;
        }

        .main-layout {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 55px;
            max-width: 1117px;
            margin: 0 auto;
        }

        .left-col {
            text-align: center;
            transform: translateX(-7vw);
        }

        .raised-text {
            font-size: 3.23rem;
            font-weight: 900;
            line-height: 1.1;
            color: black;
        }

        .amount-text {
            font-size: 4.65rem;
            font-weight: 900;
            color: #e91e63;
            text-shadow: 2px 2px 0 white;
        }

        .start-card {
            background: #e1eff6;
            border: 5px solid #d4b070;
            border-radius: 20px;
            padding: 37px;
            text-align: center;
            width: 604px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.37rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #9c27b0, #e91e63);
            color: white;
            padding: 6px 18px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 13px;
            border: 3px solid black;
            box-shadow: 4px 4px 0 black;
        }

        .card-title {
            font-size: 1.86rem;
            margin-bottom: 8px;
            color: #1f2937;
        }

        .card-desc {
            font-size: 1.02rem;
            color: #6b7280;
            margin-bottom: 27px;
        }

        .btn {
            background: linear-gradient(45deg, #9c27b0, #e91e63);
            color: white;
            border: none;
            padding: 8px 22px;
            font-size: 0.93rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4);
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .right-col {
            text-align: center;
            transform: translateX(10vw);
        }

        .mascot-img {
            width: 297px;
            border-radius: 15px;
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .footer-area {
            text-align: center;
            margin-top: 8vh;
        }

        .builder-text {
            font-size: 1.11rem;
            font-weight: bold;
            color: #1f2937;
            transform: translateY(-3vh);
            display: inline-block;
        }

        .builder-text .highlight {
            color: #e91e63;
        }

        .team-heading {
            font-size: 1.86rem;
            font-weight: 900;
            margin-top: 5vh;
            margin-bottom: 18px;
            color: #333;
        }

        .team-members {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .member {
            background: white;
            padding: 8px 4px;
            border: 1px solid #ccc;
            font-size: 0.69rem;
            font-weight: bold;
            text-align: center;
            width: 88px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 12px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .member:hover {
            border-color: #9c27b0;
            transform: translateY(-4px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .member img {
            width: 64px;
            height: 64px;
            margin-bottom: 3px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #e5e7eb;
        }

        .member span {
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.3px;
        }

        .official-website {
            position: absolute;
            bottom: 15vh;
            right: 30px;
            text-align: right;
            font-size: 0.93rem;
        }

        .official-website strong, .project-handle strong {
            color: black;
            font-weight: 900;
            font-size: 1.11rem;
        }

        .official-website a, .project-handle a {
            color: blue;
            text-decoration: none;
            font-weight: bold;
        }

        .project-handle {
            position: absolute;
            bottom: 15vh;
            left: 30px;
            text-align: left;
            font-size: 0.93rem;
        }

        /* Quiz & Result Screens */
        .quiz-container {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 820px;
            padding: 25px 20px;
            border: 5px solid #d4b070;
            margin: auto;
        }

        #resultScreen .quiz-container {
            background: linear-gradient(135deg, #fef3c7, #fde047);
            border-color: #d4b070;
        }

        #resultScreen h1,
        #resultScreen h2,
        #resultScreen p,
        #resultScreen strong {
            color: #1f2937 !important;
        }

        .progress-bar {
            height: 6px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #9c27b0, #e91e63);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question {
            background: #e3f2fd;
            padding: 18px;
            border-radius: 16px;
            margin: 15px 0;
            border: 2px solid #42a5f5;
        }

        .options {
            display: grid;
