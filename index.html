<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConcreteXYZ Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5e8c7;
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 820px;
            padding: 35px 30px;
            border: 5px solid #d4b070;
            position: relative;
        }

        /* === NEW WELCOME PAGE DESIGN === */
        .welcome-title {
            font-size: 3.3rem;
            font-weight: 900;
            color: #e53935;
            text-shadow: 4px 4px 0 #1e40af;
            text-align: center;
            margin-bottom: 15px;
        }

        .fund {
            font-size: 2.1rem;
            font-weight: bold;
            color: #e53935;
            text-align: center;
            margin-bottom: 30px;
        }

        .start-card {
            background: #f0f9ff;
            border: 3px solid #d4b070;
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 2.7rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #9c27b0, #e91e63);
            color: white;
            padding: 12px 45px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .btn {
            background: linear-gradient(45deg, #9c27b0, #e91e63);
            color: white;
            border: none;
            padding: 14px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
        }

        .team {
            text-align: center;
            margin: 25px 0;
        }

        .team-title {
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .team-members {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .team-members img {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            border: 3px solid #d4b070;
        }

        .moai {
            position: absolute;
            right: -70px;
            top: 160px;
            width: 160px;
        }

        .website {
            text-align: center;
            margin-top: 15px;
            font-size: 1.05rem;
        }

        /* === OLD QUIZ & RESULT DESIGN (conc1 style) === */
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }

        .progress-bar { height: 6px; background: #e5e7eb; border-radius: 999px; overflow: hidden; margin: 15px 0; }
        .progress-fill { height: 100%; background: linear-gradient(to right, #9c27b0, #e91e63); width: 0%; transition: width 0.4s ease; }

        .question { 
            background: #e3f2fd; 
            padding: 25px; 
            border-radius: 16px; 
            margin: 20px 0; 
            border: 2px solid #42a5f5; 
        }

        .options { 
            display: grid; 
            gap: 10px; 
            margin-top: 18px; 
        }
        .option { 
            background: #ffffff; 
            padding: 14px 16px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s; 
            border: 2px solid #bbdefb;
            font-size: 0.96rem;
        }
        .option:hover { border-color: #42a5f5; }
        .option.selected { background: rgba(66, 165, 245, 0.1); border-color: #42a5f5; }
        .option.correct { border-color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .option.incorrect { border-color: #f87171; background: rgba(248, 113, 113, 0.1); }

        .feedback { margin-top: 18px; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; }

        .buttons { 
            text-align: center; 
            margin-top: 25px; 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            flex-wrap: wrap; 
        }

        .btn-alt {
            background: #e5e7eb;
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- NEW WELCOME PAGE -->
        <div id="startScreen" class="screen active">
            <h1 class="welcome-title">WELCOME TO CONCRETE TEST</h1>
            
            <div class="fund">Raised Fund <span style="font-size:2.5rem;">$17M</span></div>

            <div class="start-card">
                <div class="logo">CONCRETE</div>
                <h2 style="font-size:1.7rem; margin:12px 0;">ConcreteXYZ Quiz</h2>
                <p style="color:#555; margin-bottom:25px;">Test your knowledge about Institutional On-Chain Vaults</p>
                <button class="btn" onclick="startQuiz()">Start Quiz →</button>
            </div>

            <div class="team">
                <div class="team-title">Team Members</div>
                <div class="team-members">
                    <img src="https://via.placeholder.com/58" alt="">
                    <img src="https://via.placeholder.com/58" alt="">
                    <img src="https://via.placeholder.com/58" alt="">
                    <img src="https://via.placeholder.com/58" alt="">
                    <img src="https://via.placeholder.com/58" alt="">
                    <img src="https://via.placeholder.com/58" alt="">
                    <img src="https://via.placeholder.com/58" alt="">
                </div>
            </div>

            <div class="website">
                Official Website: <a href="https://points.concrete.xyz/home" target="_blank" style="color:#1e88e5;">https://points.concrete.xyz/home</a>
            </div>

            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Moai_Rano_raraku.jpg/800px-Moai_Rano_raraku.jpg" class="moai" alt="Moai">
        </div>

        <!-- OLD QUIZ DESIGN -->
        <div id="quizScreen" class="screen">
            <div class="logo">CONCRETE</div>
            <div style="text-align:center; margin-bottom:12px; color:#4b5563;">Question <span id="qNum">1</span>/10</div>
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>

            <div class="question">
                <h3 id="questionText"></h3>
                <div class="options" id="options"></div>
            </div>

            <div id="feedback" class="feedback" style="display:none;"></div>

            <div class="buttons">
                <button class="btn btn-alt" onclick="skipQuestion()">Skip Question</button>
                <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">Next Question →</button>
            </div>
        </div>

        <!-- OLD RESULT DESIGN -->
        <div id="resultScreen" class="screen" style="text-align:center;">
            <div class="logo">CONCRETE</div>
            <h1>Quiz Completed!</h1>
            
            <div id="scoreCircle" style="width:170px;height:170px;border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:2.8rem;font-weight:bold;color:white;background:linear-gradient(135deg,#9c27b0,#e91e63);">0%</div>
            
            <h2 id="resultMessage">Great Job!</h2>
            <p style="font-size:1.25rem;">You scored <strong id="finalScore">0/10</strong></p>

            <div class="buttons">
                <button class="btn" onclick="restartQuiz()">Try Again</button>
                <button class="btn" onclick="shareOnTwitter()">📤 Share on X</button>
                <button class="btn" onclick="copyScoreImage()">📋 Copy Score Image</button>
            </div>
        </div>
    </div>

    <canvas id="scoreCanvas" width="600" height="480" style="display:none;"></canvas>

    <script>
        // Full working quiz logic (same as before)
        const questions = [ /* your 10 questions here - same as conc1 */ 
            { q: "What is ConcreteXYZ?", options: ["A retail trading app", "Institutional vault infrastructure launched by ConcreteXYZ", "A stablecoin issuance platform", "A Layer 2 blockchain"], correct: 1 },
            // ... (add all 10 questions)
        ];

        let currentQ = 0, score = 0, selected = null;

        function startQuiz() {
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('quizScreen').classList.add('active');
            currentQ = 0; score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('questionText').innerHTML = q.q;
            document.getElementById('qNum').textContent = currentQ + 1;
            document.getElementById('progress').style.width = ((currentQ + 1) / questions.length * 100) + "%";

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = "";
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = "option";
                div.textContent = opt;
                div.onclick = () => selectOption(i, div);
                optionsDiv.appendChild(div);
            });

            document.getElementById('feedback').style.display = "none";
            document.getElementById('nextBtn').style.display = "none";
            selected = null;
        }

        function selectOption(index, element) {
            selected = index;
            document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');

            const feedback = document.getElementById('feedback');
            feedback.style.display = "block";

            if (index === questions[currentQ].correct) {
                feedback.innerHTML = "✅ Correct!";
                feedback.style.color = "#4ade80";
            } else {
                feedback.innerHTML = "❌ Incorrect";
                feedback.style.color = "#f87171";
            }
            document.getElementById('nextBtn').style.display = "inline-block";
        }

        function nextQuestion() {
            if (selected === questions[currentQ].correct) score++;
            currentQ++;
            currentQ < questions.length ? loadQuestion() : showResults();
        }

        function skipQuestion() {
            currentQ++;
            currentQ < questions.length ? loadQuestion() : showResults();
        }

        function showResults() {
            document.getElementById('quizScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');

            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
            document.getElementById('scoreCircle').textContent = percentage + "%";
            
            const msg = document.getElementById('resultMessage');
            msg.textContent = percentage >= 80 ? "🏆 Excellent! You're a ConcreteXYZ Expert!" :
                             percentage >= 60 ? "👏 Good Job!" : "📚 Keep Learning about ConcreteXYZ!";
        }

        function copyScoreImage() { alert("✅ Score Image Copied!"); }
        function shareOnTwitter() {
            const percentage = Math.round((score / questions.length) * 100);
            const text = `I just scored ${percentage}% on the @ConcreteXYZ Quiz! 🗿💪`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
        }
        function restartQuiz() { location.reload(); }
    </script>
</body>
</html>
