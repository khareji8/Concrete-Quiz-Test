<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConcreteXYZ Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5e8c7; /* Exact light yellow background */
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 850px;
            padding: 40px;
            border: 3px solid #d4b070;
        }

        .logo {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 8px;
            text-align: center;
            margin-bottom: 10px;
            color: #1f2937;
            border: 3px solid #1f2937;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 4px;
        }

        h1 { text-align: center; margin-bottom: 8px; color: #1f2937; }
        .subtitle { text-align: center; color: #4b5563; margin-bottom: 30px; font-size: 1.1rem; }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }

        .btn {
            background: linear-gradient(45deg, #00f5c0, #22d3ee);
            color: #0f172a;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 8px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 245, 192, 0.4); }

        .btn-skip { background: transparent; color: #4b5563; border: 2px solid #9ca3af; }
        .btn-skip:hover { background: #e5e7eb; }

        .btn-twitter { background: #1DA1F2; color: white; }
        .btn-copy { background: #6b7280; color: white; }

        .progress-bar { height: 8px; background: #e5e7eb; border-radius: 999px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; background: linear-gradient(to right, #00f5c0, #22d3ee); width: 0%; transition: width 0.4s ease; }

        .question { background: #fff; padding: 30px; border-radius: 16px; margin: 25px 0; border: 2px solid #d4b070; }
        .options { display: grid; gap: 12px; margin-top: 20px; }
        .option { background: #f9fafb; padding: 18px; border-radius: 12px; cursor: pointer; transition: all 0.3s; border: 2px solid #d1d5db; }
        .option:hover { border-color: #00f5c0; }
        .option.selected { background: rgba(0, 245, 192, 0.1); border-color: #00f5c0; }
        .option.correct { border-color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .option.incorrect { border-color: #f87171; background: rgba(248, 113, 113, 0.1); }

        .feedback { margin-top: 20px; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .buttons { text-align: center; margin-top: 30px; }
    </style>
</head>
<body>
